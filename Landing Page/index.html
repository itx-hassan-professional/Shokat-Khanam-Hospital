<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaukat Khanum Memorial Cancer Hospital & Research Centre</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <nav class="upperNavBar">
            <ul>
                <li>
                    <div class="logo">
                        <img src="../Assets/SKMT Logo.webp" width="400px" alt="SKMT Logo" />
                    </div>
                </li>
                <li>
                    <div class="nav_links">
                        <div class="nav_links_top">
                            <a href="#">Contact Us</a><span>|</span>
                            <a href="#">Lab Services</a>
                            <button id="donateBtn">Donate Now</button>
                            <ul class="social-links">
                                <li>
                                    <button class="fbLogo">
                                        <img class="fbLogo" src="../Assets/facebook B&W logo.webp" width="30px"
                                            alt="" />
                                    </button>
                                </li>
                                <li>
                                    <button class="inLogo">
                                        <img class="inLogo" src="../Assets/instagram B&W logo.png" width="30px"
                                            alt="" />
                                    </button>
                                </li>
                                <li>
                                    <button class="xLogo">
                                        <img class="xLogo" src="../Assets/X B&W logo.jpg" width="30px" alt="" />
                                    </button>
                                </li>
                                <li>
                                    <button class="ytLogo">
                                        <img class="ytLogo" src="../Assets/youtube B&W logo.webp" width="30px" alt="" />
                                    </button>
                                </li>
                                <li>
                                    <button class="liLogo">
                                        <img class="liLogo" src="../Assets/linkedIn B&W logo.jpg" width="30px" alt="" />
                                    </button>
                                </li>
                                <li>
                                    <button class="tkLogo">
                                        <img class="tkLogo" src="../Assets/tiktok B&W logo.jpg" width="30px" alt="" />
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <div id="searchBar">
                            <input id="searchBarInput" type="text" placeholder="Search" />
                            <button id="searchBarBtn">🔍</button>
                        </div>
                    </div>
                </li>
            </ul>
        </nav>
        <nav class="lowerNavBar">
            <ul>
                <li><a>About Us</a></li>
                <li><a>Patient & Families</a></li>
                <li><a>Our Network</a></li>
                <li><a>Healthcare Professionals & Researchers</a></li>
                <li><a>Donors</a></li>
                <li><a>Join Us</a></li>
            </ul>
        </nav>
    </header>
    <script src="script.js"></script>
</body>

</html>
