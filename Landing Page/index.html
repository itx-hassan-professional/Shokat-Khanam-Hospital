<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaukat Khanum Memorial Cancer Hospital & Research Centre</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <nav class="upperNavBar">
        <button
          class="hamburger"
          id="hamburgerBtn"
          aria-label="Toggle navigation"
        >
          ☰
        </button>
        <ul>
          <li>
            <div class="logo">
              <img src="../Assets/SKMT Logo.webp" alt="SKMT Logo" />
            </div>
          </li>
          <li>
            <div class="nav_links">
              <div class="nav_links_top">
                <a href="#">Contact Us</a><span>|</span>
                <a href="#">Lab Services</a>
                <button id="donateBtn">Donate Now</button>
                <ul class="social-links">
                  <li>
                    <button class="fbLogo">
                      <img
                        class="fbLogo"
                        src="../Assets/facebook B&W logo.webp"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                  <li>
                    <button class="inLogo">
                      <img
                        class="inLogo"
                        src="../Assets/instagram B&W logo.png"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                  <li>
                    <button class="xLogo">
                      <img
                        class="xLogo"
                        src="../Assets/X B&W logo.jpg"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                  <li>
                    <button class="ytLogo">
                      <img
                        class="ytLogo"
                        src="../Assets/youtube B&W logo.webp"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                  <li>
                    <button class="liLogo">
                      <img
                        class="liLogo"
                        src="../Assets/linkedIn B&W logo.jpg"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                  <li>
                    <button class="tkLogo">
                      <img
                        class="tkLogo"
                        src="../Assets/tiktok B&W logo.jpg"
                        width="30px"
                        alt=""
                      />
                    </button>
                  </li>
                </ul>
              </div>
              <div id="searchBar">
                <input id="searchBarInput" type="text" placeholder="Search" />
                <button id="searchBarBtn">🔍</button>
              </div>
            </div>
          </li>
        </ul>
      </nav>
      <nav class="lowerNavBar">
        <ul>
          <li><button>About Us ﹀</button></li>
          <li><button>Patient & Families ﹀</button></li>
          <li><button>Our Network ﹀</button></li>
          <li><button>Healthcare Professionals & Researchers ﹀</button></li>
          <li><button>Donors ﹀</button></li>
          <li><button>Join Us ﹀</button></li>
        </ul>
      </nav>
    </header>
    <script src="script.js"></script>
  </body>
</html>
